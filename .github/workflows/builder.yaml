name: Build HASS-XT Add-on

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'hass_xt_vision/**'
      - '.github/workflows/builder.yaml'
  workflow_dispatch:

jobs:
  build:
    name: Build Add-on (${{ matrix.arch }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            base: ghcr.io/home-assistant/amd64-base-debian:bookworm
          - arch: aarch64
            platform: linux/arm64
            base: ghcr.io/home-assistant/aarch64-base-debian:bookworm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from config.yaml
        id: extract_version
        run: |
          VERSION=$(grep "^version:" ./hass_xt_vision/config.yaml | sed 's/version: //g' | tr -d '"' | tr -d "'" | tr -d ' ')
          echo "VERSION=$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./hass_xt_vision
          file: ./hass_xt_vision/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_FROM=${{ matrix.base }}
          push: true
          tags: |
            ghcr.io/xtapo/hass_xt_vision-${{ matrix.arch }}:latest
            ghcr.io/xtapo/hass_xt_vision-${{ matrix.arch }}:${{ steps.extract_version.outputs.version }}
