name: Build HASS-XT Add-on

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'hass_xt_vision/**'
      - '.github/workflows/builder.yaml'
  workflow_dispatch:

jobs:
  build:
    name: Build Add-on
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Add-on Image
        uses: home-assistant/builder-action@master
        with:
          args: |
            --target hass_xt_vision \
            --image "ghcr.io/xtapo/{addon}-{arch}"
