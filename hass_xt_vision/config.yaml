name: "HASS-XT AI Vision Entity Describer"
version: "2.3.0"
slug: "hass_xt_vision"
description: "AI Vision Entity Describer Addon: Describe HA cameras and entity pictures via AI proxy with MQTT auto-discovery"
url: "https://github.com/xtapo/HASS-XT"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
startup: application
boot: auto
init: false
homeassistant_api: true
services:
  - mqtt:need
ingress: true
ingress_port: 1237
panel_icon: mdi:camera-iris
panel_title: "AI Vision Describer"
ports:
  1237/tcp: 1237
ports_description:
  1237/tcp: Web Configuration & History UI
map:
  - addon_config:rw
  - config:rw
  - share:rw
options: {}
schema: {}
image: "ghcr.io/xtapo/hass_xt_vision-{arch}"

